### EXAM PREP ORDERING ###
# Mirrors the structure/behavior of `_data/catch_up.yml`.
#
# Each entry requires either a 'slug' or a 'title' field, plus a 'date' field.
# Exam preps are date-driven (not day-of-week driven) since they occur on
# specific dates rather than every week.
#
# Use the slug if you utilize the _exam_prep collection. This will take info
# from the front matter of the corresponding file in _exam_prep/
#
# skip: true will omit the exam prep from the schedule entirely
# link overrides the default link to the collection page
exam_prep:
  - slug: "01"
    date: 2026-02-02
  - slug: "02"
    date: 2026-02-09
  - slug: "03"
    date: 2026-02-16
  - slug: "04"
    date: 2026-02-23
  - slug: "05"
    date: 2026-03-02
  - slug: "06"
    date: 2026-03-16
  - title: "Spring Break"
    date: 2026-03-23
    nonumber: true
  - slug: "07"
    date: 2026-03-30
  - slug: "08"
    date: 2026-04-13
  - slug: "09"
    date: 2026-04-20
  - slug: "10"
    date: 2026-04-27
  - slug: "11"
    date: 2026-05-04
    
    
  # note for henry: put all remaining exam preps between here

  # and here
